name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        # Builds only the static React frontend (vite) into dist/public.
        # The Express server/database are NOT deployed to Pages.
        env:
          VITE_FORM_ENDPOINT: ${{ vars.VITE_FORM_ENDPOINT }}
        run: npx vite build

      - name: Add SPA fallback (client-side routing) and custom domain
        # GitHub Pages serves 404.html for unknown paths; making it a copy of
        # index.html lets wouter handle deep links like /pricing on refresh.
        run: |
          cp dist/public/index.html dist/public/404.html
          echo "laundryrentalbrisbane.com" > dist/public/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
